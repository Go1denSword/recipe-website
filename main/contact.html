<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Idk just reach to SAU desk :)</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <nav>
    <a href="index.html" class="logo">My easy reciopies</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#recipes">Recipes</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>
</header>

<main>
  <section class="intro-section" style="text-align: left;">
    <h1 style="text-align: center;">Contact Us</h1>
    <p style="text-align: center;">Type questions suggestions etc</p>

    <form action="#" method="POST" style="max-width: 600px; margin: 30px auto; display: flex; flex-direction: column; gap: 15px;">

      <div style="display: flex; flex-direction: column; gap: 5px;">
        <label for="name" style="font-weight: bold; color: var(--text-dark);">Your Name:</label>
        <input type="text" id="name" name="name" required style="padding: 12px; border: 1px solid var(--border-color); border-radius: 4px; font-family: inherit;">
      </div>

      <div style="display: flex; flex-direction: column; gap: 5px;">
        <label for="email" style="font-weight: bold; color: var(--text-dark);">Your Email:</label>
        <input type="email" id="email" name="email" required style="padding: 12px; border: 1px solid var(--border-color); border-radius: 4px; font-family: inherit;">
      </div>

      <div style="display: flex; flex-direction: column; gap: 5px;">
        <label for="message" style="font-weight: bold; color: var(--text-dark);">Message:</label>
        <textarea id="message" name="message" rows="6" required style="padding: 12px; border: 1px solid var(--border-color); border-radius: 4px; font-family: inherit; resize: vertical;"></textarea>
      </div>

      <button type="submit" class="btn" style="border: none; cursor: pointer; font-size: 1rem; border-radius: 4px; margin-top: 10px;">Send Message</button>
    </form>
  </section>
</main>
